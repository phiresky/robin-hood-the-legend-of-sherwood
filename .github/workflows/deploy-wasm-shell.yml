name: Deploy WASM shell

on:
  push:
    branches: [main]
    paths:
      - wasm-www/index.html
      - wasm-www/package.json
      - wasm-www/pnpm-lock.yaml
      - wasm-www/scripts/inline-dist-index.mjs
      - wasm-www/src/**
      - wasm-www/tsconfig.json
      - wasm-www/vite.config.ts
      - .github/workflows/deploy-wasm-shell.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: wasm-www/package.json

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: wasm-www/pnpm-lock.yaml

      - name: Build single-file shell
        working-directory: wasm-www
        run: |
          pnpm install --frozen-lockfile
          pnpm build:shell

      - name: Stage single-file shell
        run: |
          mkdir -p target/wasm-shell-pages
          cp wasm-www/dist-inline/index.html target/wasm-shell-pages/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: target/wasm-shell-pages

  deploy:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
