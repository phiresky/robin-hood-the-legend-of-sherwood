# Build-speed tweaks for this workspace.
#
# - rustc-wrapper = sccache: cache rustc invocations across clean builds and
#   branch switches. Incremental builds are unaffected.
# - mold linker: debug-link time is usually the bottleneck in Rust; mold cuts
#   it dramatically vs the default bfd/gold/lld.

[build]
rustc-wrapper = "/usr/bin/sccache"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=mold",
    # Modern portable x86_64 baseline (AVX2/FMA/BMI), without tying builds to
    # the exact local CPU the way `target-cpu=native` would.
    "-C", "target-cpu=x86-64-v3",
]

[unstable]
codegen-backend = true

# -----------------------------------------------------------------------------
# wasm32-unknown-unknown (single-threaded, wasm-bindgen)
# -----------------------------------------------------------------------------
#
# We target plain `wasm32-unknown-unknown` and bind to the browser via
# `wasm-bindgen` (winit + wgpu both support this directly).  No
# emscripten, no SDL port, no pthreads — single-threaded.  The game's
# imperative loop is async; on wasm it runs as a `spawn_local` future
# on the main JS thread, while winit's `ApplicationHandler` also lives
# on the main thread and forwards events through an `async_channel`.
#
# The `--cfg=getrandom_backend="wasm_js"` flag tells `getrandom` to
# resolve `js-sys`-backed entropy (`crypto.getRandomValues`).  Required
# for any crate that depends transitively on `getrandom` ≥ 0.3.

[target.wasm32-unknown-unknown]
rustflags = [
    "--cfg=getrandom_backend=\"wasm_js\"",
]
