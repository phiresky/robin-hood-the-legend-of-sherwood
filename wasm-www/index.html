<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Robin Hood - Rust WASM</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: #111;
            color: #eee;
            font-family: monospace;
        }
        #canvas {
            display: block;
            margin: 8px auto;
            max-width: calc(100vw - 16px);
            height: auto;
            background: #000;
            image-rendering: pixelated;
        }
        #log {
            max-height: 240px;
            overflow-y: auto;
            padding: 8px;
            font-size: 12px;
            white-space: pre-wrap;
            border-top: 1px solid #333;
        }
        .err { color: #f77; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1024" height="768"></canvas>
    <div id="log"></div>
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
