<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Robin Hood - Rust WASM</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: #111;
            color: #eee;
            font-family: monospace;
        }
        #canvas {
            display: block;
            margin: 8px auto;
            max-width: calc(100vw - 16px);
            height: auto;
            background: #000;
            image-rendering: pixelated;
        }
        #log {
            max-height: 240px;
            overflow-y: auto;
            padding: 8px;
            font-size: 12px;
            white-space: pre-wrap;
            border-top: 1px solid #333;
        }
        .err { color: #f77; }
        #replay-timeline {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-top: 1px solid #333;
            background: #1a1a1a;
            font-size: 12px;
        }
        #replay-timeline .timeline-scrub { flex: 1; }
        #replay-timeline .timeline-time {
            min-width: 5ch;
            font-variant-numeric: tabular-nums;
        }
        #toolbar {
            display: flex;
            gap: 8px;
            padding: 6px 8px;
            border-top: 1px solid #333;
            background: #1a1a1a;
        }
        #toolbar button {
            background: #333;
            color: #eee;
            border: 1px solid #555;
            padding: 4px 10px;
            font: inherit;
            cursor: pointer;
        }
        #toolbar button:hover:not(:disabled) { background: #444; }
        #toolbar button:disabled { opacity: .5; cursor: default; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1024" height="768"></canvas>
    <div id="replay-timeline"></div>
    <div id="toolbar">
        <button id="share-replay" type="button" title="Copy a shareable URL of the current replay">
            Share replay
        </button>
        <button id="fullscreen" type="button" title="Enter fullscreen">
            Fullscreen
        </button>
    </div>
    <div id="log"></div>
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
